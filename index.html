<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Field Ticket</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: #F3F4F6; min-height: 100vh; padding-bottom: 48px; color: #4B5563; }
    .header { background: #30471F; padding: 20px 24px 18px; }
    .header-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(249,250,251,0.6); margin-bottom: 4px; }
    .header-title { font-family: 'Fredoka', sans-serif; font-size: 26px; font-weight: 700; color: #fff; line-height: 1.2; }
    .header-id { font-size: 12px; font-weight: 700; color: rgba(249,250,251,0.5); margin-top: 4px; letter-spacing: 0.05em; }
    .card { background: #fff; border-radius: 2rem; margin: 16px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
    .row { padding: 16px 24px; border-bottom: 1px solid #E5E7EB; }
    .row:last-child { border-bottom: none; }
    .row-split { padding: 16px 24px; border-bottom: 1px solid #E5E7EB; display: flex; gap: 24px; }
    .row-split > div { flex: 1; }
    .label { font-size: 10px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: #9CA3AF; margin-bottom: 5px; }
    .value { font-size: 15px; color: #18240F; line-height: 1.6; }
    .value.muted { color: #9CA3AF; font-style: italic; }
    .priority-badge { display: inline-block; padding: 4px 14px; border-radius: 9999px; font-size: 11px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; }
    .priority-Low    { background: #e6f0fb; color: #185FA5; }
    .priority-Medium { background: #FFF8E1; color: #B37F00; }
    .priority-High   { background: #FFF3E0; color: #E65100; }
    .priority-Urgent { background: #FFEBEE; color: #C62828; }
    .steps-section { padding: 16px 24px; border-bottom: 1px solid #E5E7EB; }
    .step { display: flex; align-items: flex-start; gap: 12px; margin-top: 10px; }
    .step-num { width: 26px; height: 26px; border-radius: 9999px; background: #30471F; color: #fff; font-size: 12px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
    .step-text { font-size: 14px; color: #18240F; line-height: 1.6; padding-top: 3px; }
    .footer-row { background: #F3F4F6; padding: 18px 24px; }
    .gold-bar { width: 3rem; height: 3px; background: #FFB300; border-radius: 9999px; margin-bottom: 8px; }
    .footer-row .value { font-size: 14px; color: #4B5563; }
    .sms-btn { display: inline-block; margin-top: 12px; background: #30471F; color: #F9FAFB; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; padding: 10px 20px; border-radius: 9999px; text-decoration: none; border: none; cursor: pointer; }
    .sms-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .sms-btn.secondary { background: #fff; color: #30471F; border: 1.5px solid #30471F; }
    .btn-stack { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
    .btn-stack .sms-btn { margin-top: 0; text-align: center; }
    .helper { font-size: 13px; color: #6B7280; margin-top: 10px; line-height: 1.5; }
    .done-badge { display: inline-flex; align-items: center; gap: 8px; margin-top: 12px; padding: 10px 18px; background: #E8F5E9; color: #2E7D32; border-radius: 9999px; font-size: 14px; font-weight: 700; }
    .done-badge::before { content: "✓"; font-size: 16px; }
    .loading, .error-state { text-align: center; padding: 60px 24px; color: #9CA3AF; }
    .spinner { width: 32px; height: 32px; border: 3px solid #E5E7EB; border-top-color: #30471F; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-eyebrow">Amigos Landscaping</div>
    <div class="header-title" id="header-title">Field Ticket</div>
    <div class="header-id" id="header-id"></div>
  </div>

  <div id="app">
    <div class="loading"><div class="spinner"></div><p>Loading ticket...</p></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const ticketId = params.get("id");

    function fmt(d) {
      if (!d) return "";
      return new Date(d + "T12:00:00").toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" });
    }

    function parseSteps(text) {
      if (!text) return [];
      return text.split(/\n/).map(s => s.replace(/^\d+[\.\)]\s*/, "").trim()).filter(Boolean);
    }

    function row(label, value) {
      if (!value) return "";
      return `<div class="row"><div class="label">${label}</div><div class="value">${value}</div></div>`;
    }

    function render(t) {
      document.getElementById("header-title").textContent = t.customerName ? `Field Ticket — ${t.customerName}` : "Field Ticket";
      if (t.complaintId) document.getElementById("header-id").textContent = t.complaintId;

      const steps = parseSteps(t.fieldAction);
      const badge = t.priority ? `<span class="priority-badge priority-${t.priority}">${t.priority}</span>` : "";
      const isAckOnly = t.ticketType === "Acknowledgement Only";
      const alreadyDone = t.status === "Completed" || t.status === "Resolved";

      document.getElementById("app").innerHTML = `
        <div class="card">
          <div class="row" style="display:flex;justify-content:space-between;align-items:center;">
            <div>
              <div class="label">Client</div>
              <div class="value" style="font-size:17px;font-weight:700;">${t.customerName || "—"}</div>
            </div>
            ${badge}
          </div>

          <div class="row-split">
            <div>
              <div class="label">Assigned crew</div>
              <div class="value ${!t.assignedTo ? "muted" : ""}">${t.assignedTo || "Not assigned"}</div>
            </div>
            ${t.incidentDate ? `<div><div class="label">Incident date</div><div class="value">${fmt(t.incidentDate)}</div></div>` : ""}
          </div>

          ${row("Complaint", t.complaint)}
          ${row("Details", t.description)}

          ${steps.length > 1 ? `
          <div class="steps-section">
            <div class="label">What to do</div>
            ${steps.map((s, i) => `<div class="step"><div class="step-num">${i + 1}</div><div class="step-text">${s}</div></div>`).join("")}
          </div>` : row("What to do", t.fieldAction)}

          ${row("Notes", t.crewNotes)}

          <div class="footer-row">
            <div class="gold-bar"></div>
            ${alreadyDone ? renderDone(t.status) : (isAckOnly ? renderAck(t) : renderComplete(t))}
          </div>
        </div>`;

      wireActions(t);
    }

    function renderDone(status) {
      return `
        <div class="label">Status</div>
        <div class="done-badge">${status}</div>`;
    }

    function renderAck(t) {
      return `
        <div class="label">No action required</div>
        <div class="value">Please review the note above and acknowledge that you've seen it. No photos or text needed.</div>
        <div class="btn-stack">
          <button type="button" id="ack-btn" class="sms-btn">I acknowledge</button>
        </div>`;
    }

    function renderComplete(t) {
      return `
        <div class="label">When done</div>
        <div class="value">Mark the ticket complete. If you took photos, the "with photos" option will pre-fill a text for you to attach them to.</div>
        <div class="btn-stack" id="complete-initial">
          <button type="button" id="show-options-btn" class="sms-btn">Complete ticket</button>
        </div>
        <div class="btn-stack" id="complete-options" style="display:none;">
          <a href="#" id="complete-with-photo" class="sms-btn">Complete with photos</a>
          <a href="#" id="complete-no-photo" class="sms-btn secondary">Complete without photos</a>
          <div class="helper">"With photos" opens a text to the office with a pre-filled message — just attach your pictures in Messages and send.</div>
        </div>`;
    }

    const OFFICE_SMS = "+16304466446";

    function smsLink(body) {
      return `sms:${OFFICE_SMS}&body=${encodeURIComponent(body)}`;
    }

    async function markDone(id) {
      try {
        const res = await fetch("/.netlify/functions/acknowledge", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id }),
        });
        return res.ok;
      } catch {
        return false;
      }
    }

    function wireActions(t) {
      const ackBtn = document.getElementById("ack-btn");
      if (ackBtn) {
        ackBtn.addEventListener("click", async () => {
          ackBtn.disabled = true;
          ackBtn.textContent = "Saving...";
          const ok = await markDone(t.id || new URLSearchParams(window.location.search).get("id"));
          if (ok) {
            ackBtn.parentElement.outerHTML = `<div class="done-badge">Acknowledged</div>`;
          } else {
            ackBtn.disabled = false;
            ackBtn.textContent = "Try again";
          }
        });
      }

      const showOpts = document.getElementById("show-options-btn");
      if (showOpts) {
        showOpts.addEventListener("click", () => {
          document.getElementById("complete-initial").style.display = "none";
          document.getElementById("complete-options").style.display = "flex";
        });
      }

      const ticketRef = t.complaintId || "N/A";
      const customer = t.customerName || "";
      const withPhoto = document.getElementById("complete-with-photo");
      const noPhoto = document.getElementById("complete-no-photo");
      const id = new URLSearchParams(window.location.search).get("id");

      if (withPhoto) {
        withPhoto.href = smsLink(`Ticket ${ticketRef} is complete. Photos attached. — ${customer}`);
        withPhoto.addEventListener("click", () => { markDone(id); });
      }
      if (noPhoto) {
        noPhoto.href = smsLink(`Ticket ${ticketRef} is complete. No photos. — ${customer}`);
        noPhoto.addEventListener("click", () => { markDone(id); });
      }
    }

    function showError(msg) {
      document.getElementById("app").innerHTML = `<div class="error-state"><p>${msg}</p></div>`;
    }

    if (!ticketId) {
      showError("No ticket ID in this link.");
    } else {
      fetch(`/.netlify/functions/ticket?id=${ticketId}`)
        .then(r => r.json())
        .then(data => { if (data.error) showError(data.error); else render(data); })
        .catch(() => showError("Could not load ticket. Try again."));
    }
  </script>
</body>
</html>
