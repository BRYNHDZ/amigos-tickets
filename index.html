<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Field Ticket — Amigos Landscaping</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f0;
      color: #1a1a1a;
      min-height: 100vh;
    }

    .header {
      background: #30471F;
      padding: 20px 24px 18px;
    }

    .header-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #9fbd8a;
      margin-bottom: 4px;
    }

    .header-title {
      font-size: 22px;
      font-weight: 600;
      color: #fff;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      margin: 16px;
      overflow: hidden;
      border: 1px solid #e8e8e4;
    }

    .row {
      padding: 16px 20px;
      border-bottom: 1px solid #f0f0ec;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .row:last-child { border-bottom: none; }

    .row-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 5px;
    }

    .row-value {
      font-size: 15px;
      color: #1a1a1a;
      line-height: 1.5;
    }

    .row-value.empty { color: #bbb; font-style: italic; }

    .priority-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .priority-Low    { background: #e6f0fb; color: #185FA5; }
    .priority-Medium { background: #faeeda; color: #854F0B; }
    .priority-High   { background: #FAECE7; color: #993C1D; }
    .priority-Urgent { background: #fcebeb; color: #A32D2D; }

    .steps {
      padding: 16px 20px;
      border-bottom: 1px solid #f0f0ec;
    }

    .steps .row-label { margin-bottom: 12px; }

    .step {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .step:last-child { margin-bottom: 0; }

    .step-num {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #30471F;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .step-text {
      font-size: 14px;
      color: #1a1a1a;
      line-height: 1.5;
      padding-top: 3px;
    }

    .footer-note {
      background: #f5f5f0;
      padding: 16px 20px;
    }

    .footer-note .row-label { margin-bottom: 6px; }
    .footer-note p { font-size: 13px; color: #555; line-height: 1.5; }

    .loading, .error-state {
      text-align: center;
      padding: 60px 24px;
      color: #888;
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #e0e0d8;
      border-top-color: #30471F;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-icon { font-size: 32px; margin-bottom: 12px; }
    .error-state p { font-size: 14px; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-label">Amigos Landscaping</div>
    <div class="header-title" id="header-title">Field Ticket</div>
  </div>

  <div id="app">
    <div class="loading">
      <div class="loading-spinner"></div>
      <p>Loading ticket...</p>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const ticketId = params.get("id");

    function fmt(date) {
      if (!date) return "";
      const d = new Date(date + "T12:00:00");
      return d.toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" });
    }

    function parseSteps(text) {
      if (!text) return [];
      return text
        .split(/\n/)
        .map(s => s.replace(/^\d+[\.\)]\s*/, "").trim())
        .filter(Boolean);
    }

    function render(ticket) {
      const steps = parseSteps(ticket.fieldAction);
      const hasSteps = steps.length > 1;

      document.getElementById("header-title").textContent =
        ticket.customerName ? `Field Ticket — ${ticket.customerName}` : "Field Ticket";

      const priorityClass = ticket.priority
        ? `priority-badge priority-${ticket.priority}`
        : "priority-badge priority-Low";

      document.getElementById("app").innerHTML = `
        <div class="card">

          <div class="row">
            <div>
              <div class="row-label">Client</div>
              <div class="row-value">${ticket.customerName || "—"}</div>
            </div>
            ${ticket.priority
              ? `<span class="${priorityClass}">${ticket.priority}</span>`
              : ""}
          </div>

          <div class="row">
            <div style="flex:1">
              <div class="row-label">Assigned crew</div>
              <div class="row-value ${!ticket.assignedTo ? "empty" : ""}">
                ${ticket.assignedTo || "Not assigned"}
              </div>
            </div>
            ${ticket.incidentDate ? `
            <div>
              <div class="row-label">Date</div>
              <div class="row-value">${fmt(ticket.incidentDate)}</div>
            </div>` : ""}
          </div>

          ${hasSteps ? `
          <div class="steps">
            <div class="row-label">What to do</div>
            ${steps.map((s, i) => `
              <div class="step">
                <div class="step-num">${i + 1}</div>
                <div class="step-text">${s}</div>
              </div>
            `).join("")}
          </div>` : ticket.fieldAction ? `
          <div class="row">
            <div>
              <div class="row-label">What to do</div>
              <div class="row-value">${ticket.fieldAction}</div>
            </div>
          </div>` : ""}

          ${ticket.crewNotes ? `
          <div class="row">
            <div>
              <div class="row-label">Notes</div>
              <div class="row-value">${ticket.crewNotes}</div>
            </div>
          </div>` : ""}

          <div class="footer-note">
            <div class="row-label">When done</div>
            <p>Text Jesus with a completion update. Take before/after photos if relevant.</p>
          </div>

        </div>
      `;
    }

    function showError(msg) {
      document.getElementById("app").innerHTML = `
        <div class="error-state">
          <div class="error-icon">⚠️</div>
          <p>${msg}</p>
        </div>
      `;
    }

    if (!ticketId) {
      showError("No ticket ID in this link.");
    } else {
      fetch(`/.netlify/functions/ticket?id=${ticketId}`)
        .then(r => r.json())
        .then(data => {
          if (data.error) showError(data.error);
          else render(data);
        })
        .catch(() => showError("Could not load ticket. Try again."));
    }
  </script>
</body>
</html>
